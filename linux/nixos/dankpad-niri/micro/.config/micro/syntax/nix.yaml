filetype: nix
detect:
  filename: "\\.nix$"

rules:
  # Comentarios
  - comment: "#.*$"

  # Strings multilínea ''...''
  - constant.string: "''([^'']|'[^'])*''"

  # Strings normales con interpolación
  - constant.string: "\"(\\\\.|[^\\\\\"])*\""

  # Rutas (paths)
  - underlined: "[a-zA-Z0-9_.\\-]*/[a-zA-Z0-9_.\\-/]*"
  - underlined: "\\./[a-zA-Z0-9_.\\-/]*"
  - underlined: "<[a-zA-Z0-9_.\\-/]+>"

  # Keywords del lenguaje
  - statement: "\\b(let|in|with|rec|inherit|assert|if|then|else|import|builtins)\\b"

  # Operadores especiales
  - statement.operator: "(\\?|//|\\+\\+|->|==|!=|<=|>=|&&|\\|\\|)"
  - statement.operator: "[=:;,\\[\\]\\{\\}\\(\\)]"

  # Atributos especiales de nixpkgs
  - preproc: "\\b(mkDerivation|stdenv|fetchurl|fetchFromGitHub|writeShellScript|makeWrapper|wrapProgram|runCommand|symlinkJoin)\\b"

  # Opciones comunes de NixOS/Home Manager
  - type: "\\b(enable|package|extraPackages|settings|extraConfig|extraOptions|services|programs|hardware|networking|users|fonts|environment|security|boot|system|home|xdg|gtk)\\b"

  # Booleanos y null
  - constant.bool: "\\b(true|false|null)\\b"

  # Números
  - constant.number: "\\b[0-9]+(\\.[0-9]+)?\\b"

  # Funciones/identificadores importantes
  - identifier: "\\b(lib\\.mkForce|lib\\.mkIf|lib\\.mkDefault|lib\\.mkMerge|lib\\.optionals|lib\\.optional|lib\\.mkOption|lib\\.types)\\b"
  - identifier: "\\b(pkgs|config|lib|inputs|outputs|self|super)\\b"

  # Atributos (clave = valor)
  - special: "^\\s*[a-zA-Z_][a-zA-Z0-9_'.\"\\-]*\\s*[=]"
